name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: npm install
      - name: Create index.html
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="tr">
          <head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Neyim Var?</title></head>
          <body><div id="root"></div><script type="module" src="/src/main.jsx"></script></body>
          </html>
          HTMLEOF
      - name: Build web
        run: npm run build
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > neyimvar.keystore
      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease
      - name: Sign AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore neyimvar.keystore \
            -storepass NeyimVar2026 -keypass NeyimVar2026 \
            android/app/build/outputs/bundle/release/app-release.aab neyimvar
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: neyimvar-release
          path: android/app/build/outputs/bundle/release/app-release.aab
