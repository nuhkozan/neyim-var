name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: npm install
      - name: Create index.html
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="tr">
          <head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Neyim Var?</title></head>
          <body><div id="root"></div><script type="module" src="/src/main.jsx"></script></body>
          </html>
          HTMLEOF
      - name: Build web
        run: npm run build
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore neyimvar.keystore \
            -alias neyimvar -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass NeyimVar2026 -keypass NeyimVar2026 \
            -dname "CN=Nuh Kozan, OU=NeyimVar, O=NeyimVar, L=Istanbul, S=Istanbul, C=TR"
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore neyimvar.keystore \
            -storepass NeyimVar2026 -keypass NeyimVar2026 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk neyimvar
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/zipalign -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            android/app/build/outputs/apk/release/app-release-signed.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neyimvar-release
          path: android/app/build/outputs/apk/release/app-release-signed.apk
