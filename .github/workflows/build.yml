name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate and print keystore
        run: |
          keytool -genkey -v -keystore neyimvar.keystore \
            -alias neyimvar -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass NeyimVar2026 -keypass NeyimVar2026 \
            -dname "CN=Nuh Kozan, OU=NeyimVar, O=NeyimVar, L=Istanbul, S=Istanbul, C=TR"
          echo "KEYSTORE_BASE64=$(base64 -w 0 neyimvar.keystore)" >> $GITHUB_OUTPUT
          base64 -w 0 neyimvar.keystore
